project:
  type: website
  output-dir: docs
  post-render:
    - powershell -ExecutionPolicy Bypass -File scripts/sync-static-assets.ps1 -OutputDir docs
  render:
    - "**/*.qmd"
    - "!drafts/**"
  resources:
    - assets/css/**
    - images/**
    - demos/*/**

website:
  title: "Darrell Wolfe, Storyteller"
  site-url: "https://darrellwolfe.github.io/darrellwolfe/"
  description: "Darrell Wolfe's central online home for creative writing, biblical studies, data storytelling, data analysis, and personal essays."
  favicon: images/favicon-dw.svg
  image: "https://darrellwolfe.github.io/darrellwolfe/images/DarrellWolfe_Profile.jpg"
  image-alt: "Portrait of Darrell Wolfe"
  open-graph:
    site-name: "Darrell Wolfe, Storyteller"
  twitter-card:
    card-style: summary_large_image
  search: true
  navbar:
    pinned: false
    left:
      - text: Home
        href: index.qmd
      - text: Author Bio
        href: author/index.qmd
      - text: NYPB
        href: nypb/index.qmd
      - text: Portfolio
        menu:
          - text: Portfolio Home
            href: portfolio/index.qmd
          - text: Data Portfolio
            href: portfolio/data/index.qmd
          - text: Author Portfolio
            href: portfolio/author/index.qmd
      - text: Writing
        menu:
          - text: All Writing
            href: posts/index.qmd
          - text: Browse Tags
            href: posts/tags/index.qmd
          - text: Personal
            href: posts/personal/index.qmd
          - text: Biblical Studies
            href: posts/biblical/index.qmd
          - text: Creative Writing
            href: posts/writing/index.qmd
          - text: Data Nerd
            href: posts/data-nerd/index.qmd
      - text: Demos
        href: demos/index.qmd

format:
  html:
    theme: cosmo
    css: assets/css/site.css
    include-after-body: assets/includes/post-share.html
    toc: false
    smooth-scroll: true
